<!-- CONTACT PAGE -->
<!doctype html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tami Fritz | Web Designer</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300..700&display=swap" rel="stylesheet">

  <!-- Bootstrap -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css"
    integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">

  <!-- Font Awesome 6 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    crossorigin="anonymous">
</head>

<body class="contact-bg d-flex flex-column min-vh-100">

  <!-- NAVBAR -->
  <nav class="navbar navbar-expand-lg navbar-light bg-light shadow-sm">
    <div class="container">
      <a class="navbar-brand fw-bold" href="#">Tami Fritz</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="navbarNav">
        <div class="navbar-nav ms-auto">
          <a class="nav-link active" href="index.html">Home</a>
          <a class="nav-link" href="projects.html">Projects</a>
          <a class="nav-link" href="contact.html">Contact</a>
        </div>
      </div>
    </div>
  </nav>

  <!-- CONTENT -->
  <main class="flex-grow-1 container d-flex align-items-center justify-content-end my-4">

    <div class="contact-panel">
      <h2 class="contact-title">Contact</h2>

      <form>

        <div class="row mb-3">
          <div class="col-md-4" style="margin-right:55px;">
            <label for="fname">First Name:</label>
            <input type="text" id="fname" name="fname">
          </div>

          <div class="col-md-4">
            <label for="lname">Last Name:</label>
            <input type="text" id="lname" name="lname">
          </div>
        </div>

        <div class="row mb-3">
          <div class="col-md-4" style="margin-right:55px;">
            <label for="pnumber">Phone Number:</label>
            <input type="text" id="pnumber" name="pnumber">
          </div>

          <div class="col-md-4">
            <label for="email">Email:</label>
            <input type="text" id="email" name="email">
          </div>
        </div>

        <div class="row mb-3">
          <div class="col-md-10">
            <label for="message">Message:</label>
            <textarea id="message" name="message" rows="8" style="width:100%;"></textarea>
          </div>
        </div>

        <div class="row mb-3">
          <div class="col-md-12 text-center">
            <button type="submit">SUBMIT</button>
          </div>
        </div>

      </form>
    </div>

  </main>

  <!-- FOOTER -->
  <footer class="site-footer text-center py-4 mt-auto">
    <div class="container">
      <div class="social-icons mb-3">
        <a href="#" target="_blank" aria-label="Facebook"><i class="fa-brands fa-facebook-f"></i></a>
        <a href="#" target="_blank" aria-label="X (Twitter)"><i class="fa-brands fa-x-twitter"></i></a>
        <a href="#" target="_blank" aria-label="Instagram"><i class="fa-brands fa-instagram"></i></a>
        <a href="#" target="_blank" aria-label="TikTok"><i class="fa-brands fa-tiktok"></i></a>
      </div>
      <p class="mb-0">&copy; 2026 Tami Fritz. All rights reserved. | <span id="currdate"></span></p>
      <script src="script.js"></script>
    </div>
  </footer>

</body>
